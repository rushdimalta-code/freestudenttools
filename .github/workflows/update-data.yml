name: Daily University & Scholarship Data Refresh

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit & push updated data files

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv

      - name: Update scholarship statuses and Tier 1 university deadlines
        run: python3 tools/update_university_data.py

      - name: Refresh full university database (Mondays only)
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            echo "Monday — refreshing universities_all.js from Hipolabs API..."
            python3 tools/fetch_all_universities.py
          else
            echo "Not Monday — skipping full university database refresh"
          fi

      - name: Regenerate static scholarship pages
        run: python3 tools/generate_scholarship_pages.py

      - name: Commit updated data files
        run: |
          git config --local user.email "bot@freestudenttools.com"
          git config --local user.name "FreeStudentTools Data Bot"
          git add data/universities.js data/scholarships_data.js data/universities_all.js scholarship/
          git diff --staged --quiet && echo "No data changes today" || \
            git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push origin main

      - name: Trigger Netlify redeploy
        if: ${{ env.NETLIFY_DEPLOY_HOOK != '' }}
        run: curl -s -X POST "$NETLIFY_DEPLOY_HOOK"
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
