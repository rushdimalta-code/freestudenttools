<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <meta name="theme-color" content="#1d4ed8">
  <title>Message Sent | FreeStudentTools</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preload" href="/assets/fonts/inter-100-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-wrapper">

<nav class="nav">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <picture>
          <source srcset="/assets/logo-sm.webp" type="image/webp">
          <img src="/assets/logo-sm.png" alt="FreeStudentTools" width="44" height="44" fetchpriority="high" loading="eager">
        </picture>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
      </ul>
    </div>
  </div>
</nav>

<main style="min-height:65vh;display:flex;align-items:center;justify-content:center;padding:64px 24px;text-align:center">
  <div>
    <div style="font-size:3.5rem;margin-bottom:16px">✅</div>
    <h1 style="font-size:2rem;font-weight:800;color:var(--text);margin-bottom:12px">Message received!</h1>
    <p style="color:var(--text-muted);max-width:420px;margin:0 auto 32px;line-height:1.7">
      Thanks for getting in touch. We read every message and will reply to your email within 48 hours.
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center">
      <a href="/scholarships.html" class="btn btn-primary">Browse Scholarships</a>
      <a href="/admissions.html" class="btn btn-secondary">Admissions Tracker</a>
      <a href="/" class="btn btn-ghost">Back to Home</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container" style="text-align:center;padding:24px 0">
    <p style="color:var(--text-muted);font-size:0.875rem">&copy; 2026 FreeStudentTools.com — All tools are free, no sign-up required.</p>
  </div>
</footer>

<script src="/js/common.js"></script>
</body>
</html>
