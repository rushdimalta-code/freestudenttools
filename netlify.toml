[build]
  publish = "."

# Individual scholarship detail pages — clean SEO URLs
[[redirects]]
  from = "/scholarship/:id"
  to = "/scholarship.html?id=:id"
  status = 200

# Pretty URL rewrite for all static HTML pages (/contact → /contact.html etc.)
