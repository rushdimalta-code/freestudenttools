  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/scholarships"
  to = "/scholarships.html"
  status = 200

[[redirects]]
  from = "/admissions"
  to = "/admissions.html"
  status = 200

[[redirects]]
