[build]
  publish = "."

# Individual scholarship detail pages — clean SEO URLs
[[redirects]]
  from = "/scholarship/:id"
  to = "/scholarship.html?id=:id"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Immutable static assets — 1 year cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS — 7 day cache (site deploys on content change; Netlify atomic deploys handle stale-on-update)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Data files — 2 hour cache (bot updates daily at 06:00 UTC, status refreshes propagate within 2h)
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=3600"

# HTML — no cache (always fresh for users)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Sitemap and robots — short cache so updates propagate
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
